name: Compilar Mod Windows
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Descargar Repositorio Base
        uses: actions/checkout@v4

      - name: Instalar Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.4

      - name: Descargar tu Juego Gigante desde Google Drive
        run: |
          pip install gdown
          gdown 1pfxeyLQ1i0eUS2stb304FKfMeXkn1F99

      - name: Descomprimir Archivos con 7-Zip
        run: |
          7z x FNF-PsychEngine-1.0.4.zip -o. -y

      - name: Instalar Librerías de FNF
        run: |
          haxelib setup C:/haxelib
          haxelib install lime 8.1.1 --always
          haxelib install openfl 9.3.3 --always
          haxelib install flixel 5.6.1 --always
          haxelib run lime setup
          haxelib install flixel-addons 3.2.2 --always
          haxelib install flixel-ui 2.5.0 --always
          haxelib install tjson 1.4.0 --always
          haxelib install hscript-iris 1.1.3 --always
          haxelib install hxdiscord_rpc 1.2.4 --always
          haxelib install flxanimate --always
          haxelib git linc_luajit https://github.com --always
          haxelib git linc_ogg https://github.com --always
          haxelib install hxCodec --always

      - name: Compilar Juego en Windows Real (.exe)
        run: |
          cd FNF-PsychEngine-1.0.4
          lime build windows -release

      - name: Subir Juego Terminado
        uses: actions/upload-artifact@v4
        with:
          name: MiModWindows64
          path: FNF-PsychEngine-1.0.4/export/release/windows/bin/*
